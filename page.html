<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Signup</title>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-menu {
      margin-top: 20px;
    }

    .top-menu a {
      margin: 0 15px;
      text-decoration: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    /* Toggle Button */
    .toggle {
      margin: 15px;
      background: #ddd;
      width: 60px;
      height: 25px;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
    }

    .toggle-circle {
      width: 25px;
      height: 25px;
      background: #1e3a8a;
      border-radius: 50%;
      position: absolute;
      left: 0;
      transition: 0.3s;
    }

    .toggle.active .toggle-circle {
      left: 35px;
    }

    /* Card */
    .card {
      background: #2d2f3f;
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      color: white;
      text-align: center;
      margin-top: 20px;
    }

    .input-group {
      position: relative;
      margin: 12px 0;
    }

    .input-group i {
      position: absolute;
      left: 10px;
      top: 12px;
      color: white;
    }

    .input-box {
      width: 90%;
      padding: 12px 12px 12px 35px;
      border: none;
      border-radius: 5px;
      background: #1f2230;
      color: white;
    }

    .btn {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: lightgreen;
    }

    .hidden {
      display: none;
    }

  </style>
</head>
<body>

  <!-- Menu -->
  <div class="top-menu">
    <a onclick="showLogin()">LOG IN</a>
    <a onclick="showSignup()">SIGN UP</a>
  </div>

  <!-- Toggle -->
  <div class="toggle" onclick="toggleForm()" id="toggleBtn">
    <div class="toggle-circle"></div>
  </div>

  <!-- Card -->
  <div class="card">
    <h2 id="formTitle">Sign Up</h2>

    <!-- Name (only signup) -->
    <div class="input-group" id="nameField">
      <i class="fa fa-user"></i>
      <input type="text" class="input-box" placeholder="Your Name">
    </div>

    <!-- Email -->
    <div class="input-group">
      <i class="fa fa-envelope"></i>
      <input type="email" class="input-box" placeholder="Your Email">
    </div>

    <!-- Password -->
    <div class="input-group">
      <i class="fa fa-lock"></i>
      <input type="password" class="input-box" placeholder="Your Password">
    </div>

    <button class="btn" id="submitBtn">SUBMIT</button>
  </div>

 <script>
let isSignup = true;

function toggleForm() {
  isSignup = !isSignup;
  updateForm();
}

function showLogin() {
  isSignup = false;
  updateForm();
}

function showSignup() {
  isSignup = true;
  updateForm();
}

function updateForm() {
  const title = document.getElementById("formTitle");
  const nameField = document.getElementById("nameField");
  const toggle = document.getElementById("toggleBtn");

  if (isSignup) {
    title.innerText = "Sign Up";
    nameField.style.display = "block";
    toggle.classList.add("active");
  } else {
    title.innerText = "Login";
    nameField.style.display = "none";
    toggle.classList.remove("active");
  }
}

// ← Add this part for redirect on submit
document.getElementById("submitBtn").addEventListener("click", function() {
    const name = document.querySelector("#nameField input").value;
    const email = document.querySelector("input[type='email']").value;
    const password = document.querySelector("input[type='password']").value;

    if (isSignup) {
        if(!name || !email || !password){
            alert("Please fill all fields for signup");
            return;
        }
    } else {
        if(!email || !password){
            alert("Please fill all fields for login");
            return;
        }
    }

    window.location.href = "music.html";
});
</script>
</body>
</html>
